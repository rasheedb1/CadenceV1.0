[build]
builder = "DOCKERFILE"
# Absolute from repo root: with a Dockerfile at repo root (FrontEnd) Railway
# would otherwise resolve "Dockerfile" to the wrong file and break the build.
dockerfilePath = "chief-agents/Dockerfile"

[deploy]
startCommand = "node dist/orchestrator.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
