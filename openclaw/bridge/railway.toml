[build]
builder = "DOCKERFILE"
# Absolute from repo root: with a Dockerfile at repo root (FrontEnd) Railway
# would otherwise resolve "Dockerfile" to the wrong file and break the build.
dockerfilePath = "openclaw/bridge/Dockerfile"

[deploy]
startCommand = "bash /home/node/bridge/startup.sh"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
